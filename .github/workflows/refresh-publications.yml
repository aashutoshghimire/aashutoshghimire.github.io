name: Refresh publications from Google Scholar

on:
  schedule:
    # Every Sunday at 06:00 UTC. Adjust if you want a different cadence.
    - cron: "0 6 * * 0"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed to push the regenerated files back to the repo

concurrency:
  group: refresh-publications
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh data from Google Scholar + OpenAlex
        run: python scripts/update_from_scholar.py
        continue-on-error: true   # Scholar CAPTCHAs shouldn't fail the run

      - name: Rebuild publications.html
        run: python scripts/build_publications.py

      - name: Commit changes if any
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications.json publications.html index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(pubs): refresh from Google Scholar"
            git push
          fi
